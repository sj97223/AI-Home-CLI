<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magnum SSH Dash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/theme-init.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm/css/xterm.css" />
    <style>
      /* CSS Variables for theming */
      :root {
        --bg-primary: #020617;
        --bg-secondary: #0f172a;
        --bg-tertiary: #1e293b;
        --bg-input: #020617;
        --border-color: #334155;
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --text-muted: #64748b;
        --accent-primary: #10b981;
        --accent-hover: #059669;
        --accent-bg: #064e3b;
        --danger: #dc2626;
        --danger-bg: #7f1d1d;
        --warning: #f59e0b;
        --warning-bg: #78350f;
        --info: #3b82f6;
        --info-bg: #1e3a5f;
        --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        --radius: 12px;
        --radius-sm: 8px;
      }

      [data-theme="light"] {
        --bg-primary: #f8fafc;
        --bg-secondary: #ffffff;
        --bg-tertiary: #f1f5f9;
        --bg-input: #ffffff;
        --border-color: #e2e8f0;
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --text-muted: #94a3b8;
        --accent-primary: #059669;
        --accent-hover: #047857;
        --accent-bg: #d1fae5;
        --danger: #dc2626;
        --danger-bg: #fee2e2;
        --warning: #d97706;
        --warning-bg: #fef3c7;
        --info: #2563eb;
        --info-bg: #dbeafe;
        --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      }

      /* Base styles */
      body {
        background-color: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        transition: background-color 0.3s ease, color 0.3s ease;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-secondary);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border-color);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--text-muted);
      }

      /* Card styles */
      .card {
        background-color: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        transition: all 0.3s ease;
      }

      /* Input styles */
      .input {
        background-color: var(--bg-input);
        border: 1px solid var(--border-color);
        color: var(--text-primary);
        border-radius: var(--radius-sm);
        padding: 0.625rem 0.875rem;
        font-size: 0.875rem;
        transition: all 0.2s ease;
        width: 100%;
      }
      .input:focus {
        outline: none;
        border-color: var(--accent-primary);
        box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
      }
      .input::placeholder {
        color: var(--text-muted);
      }

      /* Button styles */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        padding: 0.625rem 1rem;
        font-size: 0.875rem;
        font-weight: 500;
        border-radius: var(--radius-sm);
        border: none;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .btn-primary {
        background-color: var(--accent-primary);
        color: white;
      }
      .btn-primary:hover {
        background-color: var(--accent-hover);
      }
      .btn-secondary {
        background-color: var(--bg-tertiary);
        color: var(--text-primary);
        border: 1px solid var(--border-color);
      }
      .btn-secondary:hover {
        background-color: var(--border-color);
      }
      .btn-danger {
        background-color: var(--danger);
        color: white;
      }
      .btn-danger:hover {
        background-color: #b91c1c;
      }
      .btn-icon {
        padding: 0.5rem;
        min-width: 36px;
      }

      /* Status indicator */
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        display: inline-block;
      }
      .status-dot.connected {
        background-color: #10b981;
        box-shadow: 0 0 8px #10b981;
      }
      .status-dot.disconnected {
        background-color: #64748b;
      }
      .status-dot.error {
        background-color: #ef4444;
        box-shadow: 0 0 8px #ef4444;
      }
      .status-dot.warning {
        background-color: #f59e0b;
        box-shadow: 0 0 8px #f59e0b;
      }

      /* Terminal tab */
      .tab {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.375rem 0.75rem;
        font-size: 0.8125rem;
        border-radius: var(--radius-sm);
        background-color: var(--bg-tertiary);
        color: var(--text-secondary);
        border: 1px solid var(--border-color);
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .tab:hover {
        background-color: var(--border-color);
      }
      .tab.active {
        background-color: var(--accent-bg);
        color: var(--accent-primary);
        border-color: var(--accent-primary);
      }

      /* Session item */
      .session-item {
        background-color: var(--bg-tertiary);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-sm);
        padding: 0.875rem;
        transition: all 0.2s ease;
      }
      .session-item:hover {
        border-color: var(--accent-primary);
      }

      /* Animations */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fadeIn {
        animation: fadeIn 0.3s ease-out;
      }

      /* Login page specific */
      .login-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }
      .login-card {
        width: 100%;
        max-width: 400px;
        padding: 2rem;
      }

      /* Dashboard header */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 1rem;
        padding: 1rem 1.5rem;
        background-color: var(--bg-secondary);
        border-bottom: 1px solid var(--border-color);
        position: sticky;
        top: 0;
        z-index: 100;
      }

      /* Section headers */
      .section-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: 0.75rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      /* Form label */
      .form-label {
        display: block;
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--text-secondary);
        margin-bottom: 0.375rem;
      }

      /* Icon button with tooltip */
      .tooltip {
        position: relative;
      }
      .tooltip::after {
        content: attr(data-tooltip);
        position: absolute;
        bottom: 100%;
        left: 50%;
        transform: translateX(-50%);
        padding: 0.25rem 0.5rem;
        font-size: 0.75rem;
        background-color: var(--bg-tertiary);
        color: var(--text-primary);
        border-radius: 4px;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
      }
      .tooltip:hover::after {
        opacity: 1;
      }

      /* Mobile responsive */
      @media (max-width: 768px) {
        .header {
          flex-direction: column;
          align-items: flex-start;
        }
        .header-actions {
          width: 100%;
          flex-wrap: wrap;
        }
      }

      /* Light mode specific overrides */
      [data-theme="light"] .btn-primary {
        color: white;
      }
      [data-theme="light"] .tab.active {
        color: #047857;
      }

      /* xterm overrides */
      .xterm {
        padding: 8px;
      }
    </style>
  </head>
  <body>
    <!-- Login View -->
    <div id="loginView" class="login-container">
      <div class="card login-card animate-fadeIn">
        <div class="text-center mb-6">
          <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-emerald-500/10 mb-4">
            <svg class="w-8 h-8 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
            </svg>
          </div>
          <h1 class="text-2xl font-bold" data-i18n="loginTitle">Magnum SSH Dash</h1>
          <p id="buildTag" class="text-xs text-[var(--text-muted)] mt-1">Version: -</p>
        </div>
        <p class="text-sm text-[var(--text-secondary)] mb-6 text-center" data-i18n="loginDesc">登录后使用网页 CLI，多会话窗口可切换。</p>
        <form id="loginForm" class="space-y-4">
          <div>
            <label class="form-label" data-i18n="username">用户名</label>
            <input id="loginUsername" class="input" placeholder="用户名" required />
          </div>
          <div>
            <label class="form-label" data-i18n="password">密码</label>
            <input id="loginPassword" type="password" class="input" placeholder="密码" required />
          </div>
          <small id="loginError" class="text-sm text-red-500 hidden block"></small>
          <button type="submit" class="btn btn-primary w-full" data-i18n="login">登录</button>
        </form>
        <div class="mt-6 pt-4 border-t border-[var(--border-color)] flex justify-center gap-2">
          <button id="langToggleBtn" class="btn btn-secondary text-sm" title="Toggle Language">
            <span class="lang-zh">中文</span>
            <span class="lang-en">EN</span>
          </button>
          <button id="themeToggleBtn" class="btn btn-secondary btn-icon" title="Toggle Theme">
            <span class="theme-icon">🌙</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Dashboard View -->
    <div id="dashboardView" class="hidden">
      <!-- Header -->
      <header class="header">
        <div>
          <h1 class="text-xl font-bold" data-i18n="dashboardTitle">Web CLI 多会话控制台</h1>
          <p id="buildTagDash" class="text-xs text-[var(--text-muted)]">Version: -</p>
          <p id="userTag" class="text-sm text-[var(--text-secondary)]"></p>
        </div>
        <div class="header-actions flex gap-2 flex-wrap">
          <button id="themeToggleBtnDash" class="btn btn-secondary btn-icon tooltip" data-tooltip="切换主题">
            <span class="theme-icon">🌙</span>
          </button>
          <button id="langToggleBtnDash" class="btn btn-secondary text-sm" title="Toggle Language">
            <span class="lang-zh">中文</span>
            <span class="lang-en">EN</span>
          </button>
          <button id="changeUsernameBtn" class="btn btn-secondary text-sm" data-i18n="changeUsername">改用户名</button>
          <button id="changePasswordBtn" class="btn btn-secondary text-sm" data-i18n="changePassword">改密码</button>
          <button id="logoutButton" class="btn btn-danger text-sm" data-i18n="logout">退出登录</button>
        </div>
      </header>

      <div class="max-w-7xl mx-auto p-4 space-y-4">
        <!-- Create Session Section -->
        <section class="card p-4">
          <div class="flex items-center justify-between mb-4">
            <h2 class="section-title mb-0">
              <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
              </svg>
              <span data-i18n="createSession">创建会话</span>
            </h2>
            <span class="text-xs text-[var(--text-muted)]">支持 SSH 自动/手动进入</span>
          </div>
          <form id="createSessionForm" class="grid gap-3 md:grid-cols-8">
            <div class="md:col-span-2">
              <label class="form-label" data-i18n="sessionName">会话名称</label>
              <input id="sessionDisplayName" class="input" placeholder="比如：My Shell" required />
            </div>
            <div>
              <label class="form-label" data-i18n="cwd">工作目录</label>
              <select id="cwd" class="input"></select>
            </div>
            <div>
              <label class="form-label" data-i18n="sshMode">SSH 模式</label>
              <select id="sshMode" class="input">
                <option value="auto">auto</option>
                <option value="manual">manual</option>
              </select>
            </div>
            <div>
              <label class="form-label" data-i18n="agentPreset">Agent 预设</label>
              <select id="agentPreset" class="input">
                <option value="shell">shell</option>
                <option value="claude">claude</option>
                <option value="openclaw">openclaw</option>
                <option value="codex">codex</option>
                <option value="gemini">gemini</option>
                <option value="custom">custom</option>
              </select>
            </div>
            <div>
              <label class="form-label" data-i18n="sshUser">SSH 用户</label>
              <input id="sshUser" class="input" data-i18n-placeholder="sshUserPlaceholder" placeholder="如：jisong" />
            </div>
            <div>
              <label class="form-label" data-i18n="sshHost">SSH 主机</label>
              <input id="sshHost" class="input" value="127.0.0.1" />
            </div>
            <div class="flex items-end">
              <button type="submit" class="btn btn-primary w-full" data-i18n="create">创建并打开</button>
            </div>
            <div id="customCommandWrap" class="hidden md:col-span-8">
              <label class="form-label" data-i18n="customCommand">自定义启动命令</label>
              <input id="customCommand" class="input" placeholder="例如: aider --model o3-mini" />
            </div>
          </form>
          <div class="flex flex-wrap items-center gap-2 mt-4 pt-3 border-t border-[var(--border-color)]">
            <span class="text-xs text-[var(--text-muted)]" data-i18n="quickCreate">快捷创建:</span>
            <button id="quickClaude" class="btn btn-secondary text-xs">Claude</button>
            <button id="quickOpenClaude" class="btn btn-secondary text-xs">OpenClaw</button>
            <button id="quickCodex" class="btn btn-secondary text-xs">Codex</button>
            <button id="quickGemini" class="btn btn-secondary text-xs">Gemini</button>
          </div>
        </section>

        <!-- Main Content Grid -->
        <div class="grid md:grid-cols-3 gap-4">
          <!-- Sessions List -->
          <div class="card p-4">
            <div class="flex items-center justify-between mb-4">
              <h2 class="section-title mb-0">
                <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path>
                </svg>
                <span data-i18n="sessions">会话列表</span>
              </h2>
              <button id="pinWindowBtn" class="btn btn-secondary btn-icon tooltip" data-i18n-title="pinWindow" data-tooltip="窗口置顶">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path>
                </svg>
              </button>
            </div>
            <ul id="sessions" class="space-y-2 text-sm"></ul>
          </div>

          <!-- Terminal Section -->
          <div class="md:col-span-2 card p-4">
            <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
              <h2 class="section-title mb-0">
                <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                </svg>
                <span data-i18n="terminalWindow">终端窗口</span>
              </h2>
              <div class="flex items-center gap-2 flex-wrap">
                <div class="flex items-center gap-2 text-xs px-2 py-1 rounded bg-[var(--bg-tertiary)]">
                  <span id="statusDot" class="status-dot disconnected"></span>
                  <span id="connectionMode" class="text-[var(--text-muted)]">未连接</span>
                </div>
                <button id="switchModeBtn" class="btn btn-secondary text-xs" data-i18n-title="switchMode" title="切换模式">切换</button>
                <button id="switchWsBtn" class="btn btn-secondary text-xs" data-i18n-title="switchWs" title="切换到 WS">WS</button>
                <button id="fullscreenBtn" class="btn btn-secondary btn-icon tooltip" data-i18n-title="fullscreen" data-tooltip="全屏">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path>
                  </svg>
                </button>
                <button id="clearTerminalBtn" class="btn btn-secondary btn-icon tooltip" data-i18n-title="clearTerminal" data-tooltip="清空">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                  </svg>
                </button>
                <span id="terminalStatus" class="text-xs text-[var(--text-muted)]">未连接</span>
              </div>
            </div>
            <div id="terminalTabs" class="flex gap-2 flex-wrap mb-3"></div>
            <div id="terminal" class="h-[50vh] min-h-[260px] md:h-[420px] w-full border border-[var(--border-color)] rounded-lg overflow-hidden bg-[var(--bg-input)]"></div>
            <form id="commandForm" class="flex gap-2 mt-3">
              <input id="commandInput" class="input flex-1" placeholder="命令输入兜底（例如: pwd）" />
              <button type="submit" class="btn btn-secondary" data-i18n="send">发送</button>
            </form>
          </div>
        </div>

        <!-- Connection Events -->
        <details class="card p-4">
          <summary class="cursor-pointer select-none text-sm font-semibold text-[var(--text-primary)] flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
            </svg>
            <span data-i18n="connectionEvents">连接事件</span>
          </summary>
          <div class="mt-3">
            <ul id="socketEvents" class="text-xs space-y-1 max-h-44 overflow-auto"></ul>
          </div>
        </details>

        <!-- File Manager -->
        <details class="card p-4">
          <summary class="cursor-pointer select-none text-sm font-semibold text-[var(--text-primary)] flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
            </svg>
            <span data-i18n="files">文件管理</span>
          </summary>
          <div class="grid md:grid-cols-2 gap-4 mt-4">
            <div class="space-y-3">
              <h3 class="text-sm font-semibold text-[var(--text-primary)]" data-i18n="upload">上传文件</h3>
              <input id="uploadPath" class="input" placeholder="目标目录" />
              <input id="fileInput" type="file" class="block w-full text-sm text-[var(--text-secondary)] file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-emerald-500 file:text-white hover:file:bg-emerald-600" />
              <button id="uploadBtn" class="btn btn-primary" data-i18n="upload">上传</button>
            </div>
            <div class="space-y-3">
              <h3 class="text-sm font-semibold text-[var(--text-primary)]" data-i18n="browseDirectory">目录浏览</h3>
              <input id="listPath" class="input" placeholder="目录路径" />
              <button id="listBtn" class="btn btn-secondary" data-i18n="list">列出</button>
              <ul id="files" class="text-sm space-y-1 max-h-48 overflow-auto"></ul>
            </div>
          </div>
        </details>
      </div>
    </div>

    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit/lib/addon-fit.js"></script>
    <script>
      let currentUser = null;
      let term = null;
      let fitAddon = null;
      let inputDisposer = null;
      let activeSessionId = "";
      const sessionStates = new Map();
      let resizeListener = null;
      let buildMeta = null;
      let agentPresets = [];
      const socketEventLog = [];
      const commandHistory = [];
      const MAX_HISTORY = 50;
      let historyIndex = -1;
      let focusBound = false;
      let preferHttpMode = false;

      const el = (id) => document.getElementById(id);

      // i18n translations
      const i18n = {
        zh: {
          loginTitle: "Magnum SSH Dash",
          loginDesc: "登录后使用网页 CLI，多会话窗口可切换。",
          username: "用户名",
          password: "密码",
          login: "登录",
          dashboardTitle: "Web CLI 多会话控制台",
          createSession: "创建会话",
          sshMode: "SSH 模式",
          sshModeAuto: "自动",
          sshModeManual: "手动",
          sessionName: "会话名称",
          cwd: "工作目录",
          agentPreset: "Agent 预设",
          customCommand: "自定义命令",
          sshUser: "SSH 用户",
          sshUserPlaceholder: "如：jisong",
          sshHost: "SSH 主机",
          create: "创建并打开",

        const res = await fetch(path, { credentials: "include", ...options, headers, body: options.body });

      const renderTabs = () => {
        const wrap = el("terminalTabs");
        wrap.innerHTML = "";
        for (const [sessionId, state] of sessionStates.entries()) {

      const updateStatus = (text) => {
        const statusEl = el("terminalStatus");
        const statusDot = el("statusDot");
        const connectionMode = el("connectionMode");
        const state = activeSessionId ? sessionStates.get(activeSessionId) : null;
        const mode = state?.mode || "";

        const lang = document.documentElement.lang || 'zh';

        if (mode === "ws") {
          statusDot.className = "status-dot connected";
          connectionMode.textContent = lang === 'zh' ? 'WebSocket 已连接' : 'WebSocket Connected';
          connectionMode.className = "text-emerald-500";
        } else if (mode === "http") {
          statusDot.className = "status-dot warning";
          connectionMode.textContent = lang === 'zh' ? 'HTTP 降级模式' : 'HTTP Fallback';
          connectionMode.className = "text-amber-500";
        } else {
          statusDot.className = "status-dot disconnected";
          connectionMode.textContent = lang === 'zh' ? '未连接' : 'Not Connected';
          connectionMode.className = "text-[var(--text-muted)]";
        }

        const modeLabel = mode === "http" ? (lang === 'zh' ? ' (HTTP Fallback)' : ' (HTTP)') : "";
        statusEl.textContent = `${text}${modeLabel}`;
      };

      const pushSocketEvent = (text) => {
        const now = new Date();
        const stamp = now.toLocaleTimeString("en-US", { hour12: false });
        socketEventLog.unshift(`[${stamp}] ${text}`);
        if (socketEventLog.length > 20) socketEventLog.length = 20;
        const wrap = el("socketEvents");
        if (wrap) {
          wrap.innerHTML = "";
          for (const line of socketEventLog) {
            const li = document.createElement("li");
            li.className = "text-[var(--text-muted)] font-mono";
            li.textContent = line;
            wrap.appendChild(li);
          }
        }
      };

      const detachActiveInput = () => {
        if (inputDisposer) {
          inputDisposer.dispose();
          inputDisposer = null;
        }
      };

      const detachResizeListener = () => {
        if (resizeListener) {
          window.removeEventListener("resize", resizeListener);
          resizeListener = null;
        }
      };

      const closeState = async (state) => {
        if (!state) return;
        if (state.socket) {
          state.socket.disconnect();
          state.socket = null;
        }
        if (state.pollTimer) {
          clearInterval(state.pollTimer);
          state.pollTimer = null;
        }
        if (state.keepaliveTimer) {
          clearInterval(state.keepaliveTimer);
          state.keepaliveTimer = null;
        }
        if (state.http && state.http.terminalId) {
          try {
            await api(`/api/sessions/${state.sessionId}/terminal/http/stop`, {
              method: "POST",
              body: JSON.stringify({ terminalId: state.http.terminalId })
            });
          } catch {}
        }
      };

      const normalizeSeq = (value) => {
        if (value === null || value === undefined) return null;
        const num = Number(value);
        return Number.isFinite(num) ? num : null;
      };

      const nextSeqForState = (state) => {
        state.seq = (state.seq || 0) + 1;
        if (!state.pendingSeqs) state.pendingSeqs = new Set();
        state.pendingSeqs.add(state.seq);
        return state.seq;
      };

      const consumeAckForState = (state, payload) => {
        const ack = normalizeSeq(payload?.ack ?? payload?.seq ?? payload?.lastAck ?? payload);
        if (ack === null) return;
        state.lastAck = Math.max(state.lastAck || 0, ack);
        if (state.pendingSeqs) {
          for (const seq of Array.from(state.pendingSeqs)) {
            if (seq <= ack) state.pendingSeqs.delete(seq);
          }
        }
      };

      const shouldReconnectForError = (err) => {
        const message = String(err?.message || err || "");
        return message.includes("terminal_not_found") || message.includes("terminal_stale");
      };

      // Reconnect for WebSocket mode - closes WS and reconnects via WS
      const reconnectWsTerminal = async (state) => {
        if (!state) return;
        if (state.reconnecting) {
          pushSocketEvent(`reconnect_ws skipped - already reconnecting`);
          return;
        }
        // Clear pending inputs to prevent retry loop
        if (state.pendingSeqs) state.pendingSeqs.clear();
        state.reconnecting = true;
        pushSocketEvent(`reconnect_ws sid=${state.sessionId}`);
        // Cleanup old WebSocket
        if (state.socket) {
          state.socket.removeAllListeners();
          state.socket.disconnect();
          state.socket = null;
        }
        // Cleanup poll timer if exists
        if (state.pollTimer) {
          clearInterval(state.pollTimer);
          state.pollTimer = null;
        }
        // Clear mode and reconnect
        state.mode = "";
        state.http = null;
        await openSessionTerminal(state.sessionId, state.displayName, {
          preserveBuffer: true,
          forceWs: true,
          reason: "ws_reconnect"
        });
      };

      // Reconnect for HTTP mode - calls HTTP reconnect API
      const reconnectHttpTerminal = async (state) => {
        if (!state || !state.http?.terminalId) return;
        if (state.reconnecting) {
          pushSocketEvent(`reconnect_http skipped - already reconnecting`);
          return;
        }
        state.reconnecting = true;
        pushSocketEvent(`reconnect_http sid=${state.sessionId} tid=${state.http.terminalId}`);
        // Stop polling
        if (state.pollTimer) {
          clearInterval(state.pollTimer);
          state.pollTimer = null;
        }
        try {
          await api(`/api/sessions/${state.sessionId}/terminal/http/reconnect`, {
            method: "POST",
            body: JSON.stringify({
              terminalId: state.http.terminalId,
              cols: term.cols || 120,
              rows: term.rows || 30
            })
          });
          pushSocketEvent("reconnect_http api ok");
        } catch (err) {
          pushSocketEvent(`reconnect_http api fail ${err?.message || err}`);
        }
        // Restart polling with new terminal
        state.mode = "";
        await openSessionTerminal(state.sessionId, state.displayName, {
          preserveBuffer: true,
          forceHttp: true,
          reason: "http_reconnect"
        });
      };

      // Unified reconnect - chooses path based on current mode
      const reconnectTerminal = async (state, forceMode = null) => {
        if (!state) return;
        const currentMode = forceMode || state.mode;
        if (currentMode === "ws") {
          await reconnectWsTerminal(state);
        } else if (currentMode === "http") {
          await reconnectHttpTerminal(state);
        } else {
          // Fallback: try WS first
          await reconnectWsTerminal(state);
        }
      };

      const sendInputForState = async (state, data, allowRetry = true) => {
        if (!state || !data) return;
        // Skip input during reconnecting or cooldown
        if (state.reconnecting) {
          pushSocketEvent(`input skipped - ${state.reconnecting ? 'reconnecting' : 'cooldown'}`);
          return;
        }
        const seq = nextSeqForState(state);
        try {
          if (state.mode === "ws" && state.socket && state.socket.connected) {
            state.socket.emit("terminal:input", { type: "input", data });
            return;
          }
          if (state.mode === "ws") {
            throw new Error("terminal_not_found");
          }
          if (state.mode === "http" && state.http?.terminalId) {
            const res = await fetch(`/api/sessions/${state.sessionId}/terminal/http/input`, {
              method: "POST",
              credentials: "include",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ terminalId: state.http.terminalId, data, seq })
            });
            const text = await res.text();
            if (!res.ok) {
              throw new Error(text);
            }
            if (text) {
              try {
                consumeAckForState(state, JSON.parse(text));
              } catch {
                // ignore non-json body
              }
            }
            return;
          }
          throw new Error("terminal_not_found");
        } catch (err) {
          if (state.pendingSeqs) state.pendingSeqs.delete(seq);
          // Only reconnect once and don't retry the same input after reconnect
          if (allowRetry && shouldReconnectForError(err)) {
            pushSocketEvent(`input triggered reconnect, not retrying`);
            return; // Don't retry after reconnect - user can type again
          }
          throw err;
        }
      };

      const setupInputBinding = (state) => {
        detachActiveInput();
        const sendInput = (data) => {
          if (!data) return;
          sendInputForState(state, data).catch((err) => {
            pushSocketEvent(`input_error ${err?.message || "unknown"}`);
          });
        };
        inputDisposer = term.onData((data) => sendInput(data));
        detachResizeListener();
        resizeListener = () => {
          if (fitAddon) fitAddon.fit();
          const cols = term.cols || 120;
          const rows = term.rows || 30;
          if (state.mode === "ws" && state.socket) {
            state.socket.emit("terminal:resize", { type: "resize", cols, rows });
          } else if (state.mode === "http" && state.http?.terminalId) {
            fetch(`/api/sessions/${state.sessionId}/terminal/http/resize`, {
              method: "POST",
              credentials: "include",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ terminalId: state.http.terminalId, cols, rows })
            }).catch(() => undefined);
          }
        };
        window.addEventListener("resize", resizeListener);
        if (fitAddon) fitAddon.fit();
        term.focus();
        updateStatus(t("connected"));
      };

      const startWebSocketTerminal = async (sessionId, state) => {
        // Cleanup old listeners before creating new connection (idempotent)
        if (state.socket) {
          state.socket.removeAllListeners();
          state.socket.disconnect();
          state.socket = null;
        }
        if (state.pollTimer) {
          clearInterval(state.pollTimer);
          state.pollTimer = null;
        }

        const ticket = await api("/api/socket-ticket");
        pushSocketEvent(`ws: starting connection for session ${sessionId}`);
        return await new Promise((resolve, reject) => {
          const socket = io({
            withCredentials: true,
            transports: ["websocket"],
            reconnection: true,
            reconnectionAttempts: 5,
            reconnectionDelay: 1000,
            reconnectionDelayMax: 5000,
            timeout: 5000,
            auth: { ticket: ticket.ticket }
          });
          let done = false;
          let ready = false;
          let readyTimer = null;
          let reconnectAttempts = 0;
          const MAX_RECONNECT_ATTEMPTS = 5;
          const fail = (msg, details = "") => {
            if (done) return;
            done = true;
            try { socket.disconnect(); } catch {}
            const fullMsg = details ? `${msg}: ${details}` : msg;
            pushSocketEvent(`ws: failed - ${fullMsg}`);
            reject(new Error(fullMsg));
          };
          const timer = setTimeout(() => fail("websocket_timeout", "connection timed out after 6s"), 6000);

          socket.on("connect", () => {
            reconnectAttempts = 0;
            state.socket = socket;
            state.mode = "ws";
            pushSocketEvent(`ws: connected socket_id=${socket.id} session=${sessionId}`);
            pushSocketEvent(`ws: waiting for terminal:ready event...`);
            readyTimer = setTimeout(() => fail("terminal_ready_timeout", "terminal:ready not received within 1.5s"), 1500);
            socket.on("terminal:ready", (payload) => {
              if (ready) return;
              ready = true;
              if (!done) {
                clearTimeout(timer);
                if (readyTimer) clearTimeout(readyTimer);
                done = true;
                pushSocketEvent(`ws: ready runtime_id=${payload?.runtimeId || "unknown"}`);
                resolve(true);
              }
            });
            pushSocketEvent(`ws: emitting terminal:attach cols=${term.cols || 120} rows=${term.rows || 30}`);
            socket.emit("terminal:attach", { sessionId, cols: term.cols || 120, rows: term.rows || 30 });
            socket.on("terminal:output", (msg) => {
              state.hadOutput = true;
              const data = msg?.data || msg;
              pushSocketEvent(`ws: data chunk ${String(data || "").length}b`);
              if (activeSessionId === sessionId) term.write(data);
              else state.buffer += data;
            });
            const onAck = (payload) => {
              consumeAckForState(state, payload);
              const ackValue = normalizeSeq(payload?.ack ?? payload?.seq ?? payload?.lastAck ?? payload);
              if (ackValue !== null) pushSocketEvent(`ws: ack ${ackValue}`);
            };
            socket.on("terminal:ack", onAck);
            socket.on("terminal:input_ack", onAck);
            socket.on("terminal:error", (err) => {
              const errObj = typeof err === "string" ? { message: err, code: null } : err;
              pushSocketEvent(`ws: error code=${errObj.code || "unknown"} message=${errObj.message}`);
              if (errObj.code === "RUNTIME_NOT_FOUND") {
                fail("session_not_found", "The terminal session no longer exists");
                return;
              }
              if (errObj.code === "WS_UPGRADE_FAILED") {
                fail("websocket_upgrade_failed", "WebSocket upgrade was rejected by server");
                return;
              }
              if (errObj.code === "AUTH_COOKIE_MISSING") {
                fail("authentication_failed", "Missing authentication cookie");
                return;
              }
              if (errObj.code === "PROXY_WS_BLOCKED") {
                fail("websocket_blocked", "WebSocket is blocked by proxy or firewall");
                return;
              }
              if (String(err).includes("websocket_runtime_unavailable_use_http_fallback")) {
                fail("websocket_unavailable", "Falling back to HTTP terminal");
                return;
              }
              if (activeSessionId === sessionId) term.writeln(`\r\n[error] ${errObj.message}`);
            });

            socket.on("terminal:stale", (payload) => {
              // Skip stale events if we're already reconnecting or switching
              if (state.reconnecting) {
                pushSocketEvent(`ws: stale skipped - already reconnecting`);
                return;
              }
              const reason = payload?.reason || "unknown";
              pushSocketEvent(`ws: stale reason=${reason}`);
              if (activeSessionId === sessionId) {
                updateStatus(t("reconnecting"));
                state.mode = "stale";
              }
              // Auto-reconnect after stale, without waiting for user input
              state.staleTimer = setTimeout(async () => {
                if (state.mode === "stale" && !state.reconnecting) {
                  pushSocketEvent("ws: auto-reconnecting after stale");
                  await reconnectWsTerminal(state);
                }
              }, 2000);
            });

            socket.on("disconnect", (reason) => {
              pushSocketEvent(`ws: disconnected reason=${reason}`);
              if (activeSessionId === sessionId) updateStatus("ws " + (document.documentElement.lang === 'zh' ? '已断开' : 'Disconnected'));
            });
          });

          socket.on("connect_error", (err) => {
            clearTimeout(timer);
            if (readyTimer) clearTimeout(readyTimer);
            reconnectAttempts++;
            const errMsg = err.message || "unknown error";
            pushSocketEvent(`ws: connect_error attempt ${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS} - ${errMsg}`);
            if (reconnectAttempts >= MAX_RECONNECT_ATTEMPTS) {
              pushSocketEvent(`ws: max reconnect attempts (${MAX_RECONNECT_ATTEMPTS}) reached`);
              fail("connection_failed", `after ${MAX_RECONNECT_ATTEMPTS} attempts: ${errMsg}`);
            }
          });

          socket.on("reconnect", (attemptNumber) => {
            pushSocketEvent(`ws: reconnected after ${attemptNumber} attempts`);
            if (activeSessionId === sessionId) updateStatus(`${document.documentElement.lang === 'zh' ? '已重连' : 'Reconnected'} (${attemptNumber})`);
          });

          socket.on("reconnect_attempt", (attemptNumber) => {
            pushSocketEvent(`ws: reconnect_attempt ${attemptNumber}`);
            if (activeSessionId === sessionId) updateStatus(`${document.documentElement.lang === 'zh' ? '重连中' : 'Reconnecting'}... (${attemptNumber}/${MAX_RECONNECT_ATTEMPTS})`);
          });

          socket.on("reconnect_failed", () => {
            pushSocketEvent(`ws: reconnect_failed - all attempts exhausted`);
            if (activeSessionId === sessionId) updateStatus(document.documentElement.lang === 'zh' ? '重连失败' : 'Reconnect failed');
          });
        });
      };

      const startHttpFallbackTerminal = async (sessionId, state) => {
        const created = await api(`/api/sessions/${sessionId}/terminal/http/start`, {
          method: "POST",
          body: JSON.stringify({ cols: term.cols || 120, rows: term.rows || 30 })
        });
        state.mode = "http";
        state.http = {
          terminalId: created.terminalId,
          cursor: created.cursor ?? created.nextCursor ?? created.startCursor ?? null
        };
        // Reset seq after reconnect to avoid terminal_stale from seq mismatch
        state.seq = 0;
        state.lastAck = 0;
        if (state.pendingSeqs) state.pendingSeqs.clear();
        pushSocketEvent(`fallback http start tid=${state.http.terminalId}`);
        state.pollTimer = setInterval(async () => {
          // Skip if no longer in HTTP mode or terminalId is missing
          if (state.mode !== "http" || !state.http?.terminalId) {
            if (state.pollTimer) {
              clearInterval(state.pollTimer);
              state.pollTimer = null;
            }
            return;
          }
          try {
            const cursorParam = state.http && state.http.cursor !== null && state.http.cursor !== undefined
              ? `&cursor=${encodeURIComponent(state.http.cursor)}`
              : "";
            const polled = await api(
              `/api/sessions/${sessionId}/terminal/http/poll?terminalId=${encodeURIComponent(state.http.terminalId)}${cursorParam}`
            );
            if (polled?.nextCursor !== undefined || polled?.cursor !== undefined) {
              state.http.cursor = polled.nextCursor ?? polled.cursor ?? state.http.cursor;
            }
            consumeAckForState(state, polled?.ack ?? polled?.lastAck ?? polled?.seq);

            const events = Array.isArray(polled.events) ? polled.events : [];
            if (events.length) {
              for (const event of events) {
                if (!event) continue;
                if (event.type === "ack" || event.kind === "ack") {
                  consumeAckForState(state, event.ack ?? event.seq ?? event.lastAck);
                  continue;
                }
                const data = event.data ?? event.chunk ?? event.output ?? "";
                if (!data) continue;
                const isSnapshot = event.type === "snapshot" || event.kind === "snapshot" || event.full === true;
                state.hadOutput = true;
                if (isSnapshot) {
                  state.buffer = data;
                } else {
                  state.buffer += data;
                }
                if (activeSessionId === sessionId) {
                  if (isSnapshot) {
                    term.clear();
                    term.write(data);
                  } else {
                    term.write(data);
                  }
                }
              }
            } else {
              const chunks = Array.isArray(polled.chunks) ? polled.chunks : [];
              if (chunks.length) {
                state.hadOutput = true;
                const latest = chunks[chunks.length - 1];
                const previous = state.buffer || "";
                const delta = latest.startsWith(previous) ? latest.slice(previous.length) : latest;
                state.buffer = latest;
                if (activeSessionId === sessionId) {
                  if (latest.startsWith(previous)) term.write(delta);
                  else {
                    term.clear();
                    term.write(latest);
                  }
                }
              }
            }
            if (polled.closed) {
              clearInterval(state.pollTimer);
              state.pollTimer = null;
              if (activeSessionId === sessionId) updateStatus("http " + (document.documentElement.lang === 'zh' ? '回退已关闭' : 'Fallback Closed'));
            }
          } catch (err) {
            // Skip if no longer in HTTP mode
            if (state.mode !== "http" || !state.http?.terminalId) {
              if (state.pollTimer) {
                clearInterval(state.pollTimer);
                state.pollTimer = null;
              }
              return;
            }
            // Check for auth errors - don't reconnect on 401
            const errMsg = String(err?.message || err || "");
            if (errMsg.includes("401") || errMsg.includes("unauthorized") || errMsg.includes("AUTH")) {
              pushSocketEvent(`http poll auth error - stopping`);
              if (state.pollTimer) {
                clearInterval(state.pollTimer);
                state.pollTimer = null;
              }
              state.mode = "error";
              if (activeSessionId === sessionId) {
                updateStatus(document.documentElement.lang === 'zh' ? '认证失败，请重新登录' : 'Auth failed, please re-login');
              }
              return;
            }
            if (errMsg.includes("terminal_stale") || errMsg.includes("409")) {
              pushSocketEvent(`http poll stale - triggering HTTP reconnect`);
              if (activeSessionId === sessionId) {
                updateStatus("HTTP " + (document.documentElement.lang === 'zh' ? '终端已过期，正在重新连接' : 'Stale, reconnecting...'));
              }
              if (state.pollTimer) {
                clearInterval(state.pollTimer);
                state.pollTimer = null;
              }
              state.mode = "stale";
              // Use HTTP reconnect for HTTP mode
              await reconnectTerminal(state, "http");
              return;
            }
          }
        }, 350);
      };

      const openSessionTerminal = async (sessionId, displayName = "", options = {}) => {
        ensureTerminal();
        activeSessionId = sessionId;

        let state = sessionStates.get(sessionId);
        if (!state) {
          state = {
            sessionId,
            displayName,
            mode: "",
            buffer: "",
            hadOutput: false,
            socket: null,
            http: null,
            pollTimer: null,
            keepaliveTimer: null,
            seq: 0,
            lastAck: 0,
            pendingSeqs: new Set(),
            reconnecting: false,
            staleTimer: null
          };
          sessionStates.set(sessionId, state);
        }

        renderTabs();
        updateSwitchButtons();
        if (!options.preserveBuffer) term.clear();
        if (fitAddon) fitAddon.fit();
        if (state.buffer) term.write(state.buffer);

        if (!state.keepaliveTimer) {
          state.keepaliveTimer = setInterval(() => {
            api(`/api/sessions/${sessionId}/keepalive`, { method: "POST" }).catch(() => undefined);
          }, 30000);
        }

        if (state.socket || state.pollTimer) {
          setupInputBinding(state);
          // Clear reconnecting flag
          state.reconnecting = false;
          updateStatus(state.mode === "ws" ? (document.documentElement.lang === 'zh' ? 'ws 已连接' : 'WS Connected') : (document.documentElement.lang === 'zh' ? 'http 回退已连接' : 'HTTP Connected'));
          setTimeout(() => term && term.focus(), 100);
          return;
        }

        updateStatus(document.documentElement.lang === 'zh' ? '连接中...' : 'Connecting...');

        const forceHttp = options.forceHttp === true;
        if (preferHttpMode || forceHttp) {
          await startHttpFallbackTerminal(sessionId, state);
          setupInputBinding(state);
          // Clear reconnecting flag
          state.reconnecting = false;
          updateStatus("HTTP " + (document.documentElement.lang === 'zh' ? '模式已连接' : 'Mode Connected'));
          setTimeout(() => term && term.focus(), 100);
        } else {
          try {
            await startWebSocketTerminal(sessionId, state);
            setupInputBinding(state);
            // Clear reconnecting flag
            state.reconnecting = false;
            updateStatus("ws " + (document.documentElement.lang === 'zh' ? '已连接，可输入' : 'Connected - ready'));
            term.focus();
          } catch {
            await startHttpFallbackTerminal(sessionId, state);
            setupInputBinding(state);
            // Clear reconnecting flag
            state.reconnecting = false;
            updateStatus("ws " + (document.documentElement.lang === 'zh' ? '失败，已切换 HTTP 回退' : 'Failed, HTTP fallback') + ' (click terminal to input)');
            setTimeout(() => term && term.focus(), 500);
          }
        }
        setTimeout(async () => {
          if (!state || state.hadOutput) return;
          try {
            const cap = await api(`/api/sessions/${sessionId}/terminal/capture`);
            if (cap?.output) {
              state.hadOutput = true;
              if (activeSessionId === sessionId) term.write(`\r\n${cap.output}\r\n`);
              else state.buffer += `\r\n${cap.output}\r\n`;
              pushSocketEvent("capture fallback used");
            }
          } catch {}
        }, 1200);
      };

      const refreshSessions = async () => {

        if (!data.sessions || data.sessions.length === 0) {

        for (const session of data.sessions) {
          const item = document.createElement("li");
          item.className = "session-item";
          const isDetached = session.status === "detached" || session.restored;

          item.innerHTML = `
            <div class="flex items-center justify-between mb-2">
              <span class="font-medium">${session.displayName || session.name}</span>
              <span class="text-xs ${isDetached ? 'text-amber-500' : 'text-[var(--text-muted)]'}">${isDetached ? (lang === 'zh' ? '⚡ 后台运行' : '⚡ Background') : session.status}</span>

          const actions = document.createElement("div");
          actions.className = "flex flex-wrap gap-2 mt-3";

          const detachBtn = document.createElement("button");
          detachBtn.className = "btn btn-secondary text-xs";
          detachBtn.textContent = t('detachSession');
          detachBtn.title = lang === 'zh' ? "断开终端连接，会话仍在后台运行" : "Detach terminal, session runs in background";
          detachBtn.onclick = async () => {
            const state = sessionStates.get(session.id);
            if (state) {
              await closeState(state);
              sessionStates.delete(session.id);
              if (activeSessionId === session.id) {
                activeSessionId = "";
                term && term.clear();
                updateStatus(lang === 'zh' ? "已切换到后台运行" : "Detached to background");
              }
              renderTabs();

            pushSocketEvent(`session ${session.id} detached to background`);
          };

          const openBtn = document.createElement("button");
          openBtn.className = "btn btn-primary text-xs";
          openBtn.textContent = t('openTerminal');
          openBtn.onclick = () => openSessionTerminal(session.id, session.displayName || session.name).catch((err) => alert(`${lang === 'zh' ? '打开失败' : 'Failed'}: ${err.message}`));

          const rename = document.createElement("button");
          rename.className = "btn btn-secondary text-xs";
          rename.textContent = t('rename');
          rename.onclick = async () => {
            const newName = prompt(lang === 'zh' ? "输入新的会话名称" : "Enter new session name", session.displayName || session.name);
            if (!newName) return;
            await api(`/api/sessions/${session.id}`, {
              method: "PATCH",
              body: JSON.stringify({ displayName: newName.trim() })
            });
            await refreshSessions();
          };

          const kill = document.createElement("button");
          kill.className = "btn btn-danger text-xs";
          kill.textContent = t('closeSession');
          kill.onclick = async () => {
            if (!confirm(lang === 'zh' ? "确定要关闭此会话吗？" : "Are you sure you want to close this session?")) return;
            await api(`/api/sessions/${session.id}`, { method: "DELETE" });
            const state = sessionStates.get(session.id);
            await closeState(state);
            sessionStates.delete(session.id);
            if (activeSessionId === session.id) {
              activeSessionId = "";
              term && term.clear();
              updateStatus(t('notConnected'));
            }
            renderTabs();
            await refreshSessions();
          };

          actions.appendChild(detachBtn);
          actions.appendChild(openBtn);
          actions.appendChild(rename);
          actions.appendChild(kill);
          item.appendChild(actions);
          list.appendChild(item);
        }
      };

      const createSession = async (event) => {

        const sshMode = el("sshMode").value;

        const lang = document.documentElement.lang || 'zh';

        if (!displayName || !cwd) {
          alert(lang === 'zh' ? "请输入会话名称和工作目录。" : "Please enter session name and working directory.");
          return;
        }
        if (agentPreset === "custom" && !customCommand) {
          alert(lang === 'zh' ? "custom 模式需要填写启动命令。" : "Custom mode requires a startup command.");
          return;

        if (sshMode === "auto" && !sshUser) {

        }
        const tool = ["shell", "claude", "codex", "gemini"].includes(agentPreset)
          ? agentPreset
          : "shell";

        const created = await api("/api/sessions", {
          method: "POST",
          body: JSON.stringify({ displayName, cwd, sshMode, sshUser, sshHost, tool, startupCommand })
        });
        el("createSessionForm").reset();
        el("sshHost").value = "127.0.0.1";
        el("agentPreset").value = "shell";
        updateCustomCommandVisibility();
        await loadWorkdirOptions();

        }

        e.preventDefault();
        const lang = document.documentElement.lang || 'zh';
        if (!activeSessionId) {
          alert(lang === 'zh' ? "请先打开一个会话终端" : "Please open a session terminal first");
          return;
        }
        const state = sessionStates.get(activeSessionId);
        const command = el("commandInput").value;
        if (!command.trim()) return;
        if (commandHistory.length === 0 || commandHistory[commandHistory.length - 1] !== command) {
          commandHistory.push(command);
          if (commandHistory.length > MAX_HISTORY) {
            commandHistory.shift();
          }
        }
        historyIndex = commandHistory.length;
        sendInputForState(state, `${command}\n`)
          .then(() => {
            el("commandInput").value = "";
          })
          .catch((err) => {
            pushSocketEvent(`input_error ${err?.message || "unknown"}`);
            alert(`${lang === 'zh' ? '发送失败' : 'Send failed'}: ${err.message || err}`);
          });
      });

      el("commandInput").addEventListener("keydown", (e) => {
        if (commandHistory.length === 0) return;
        if (e.key === "ArrowUp") {
          e.preventDefault();
          if (historyIndex > 0) {
            historyIndex--;
            el("commandInput").value = commandHistory[historyIndex];
          }
        } else if (e.key === "ArrowDown") {
          e.preventDefault();
          if (historyIndex < commandHistory.length - 1) {
            historyIndex++;
            el("commandInput").value = commandHistory[historyIndex];
          } else {
            historyIndex = commandHistory.length;
            el("commandInput").value = "";
          }
        }
      });

      el("agentPreset").addEventListener("change", () => updateCustomCommandVisibility());
      el("quickClaude").addEventListener("click", () => quickCreateAgent("claude").catch((err) => alert(`${t('createFailed')}: ${err.message}`)));
      el("quickOpenClaude").addEventListener("click", () => quickCreateAgent("openclaw").catch((err) => alert(`${t('createFailed')}: ${err.message}`)));
      el("quickCodex").addEventListener("click", () => quickCreateAgent("codex").catch((err) => alert(`${t('createFailed')}: ${err.message}`)));
      el("quickGemini").addEventListener("click", () => quickCreateAgent("gemini").catch((err) => alert(`${t('createFailed')}: ${err.message}`)));
      el("clearTerminalBtn").addEventListener("click", () => {
        if (term) {
          term.clear();
          pushSocketEvent("terminal cleared");
        }
      });

      el("switchModeBtn").addEventListener("click", async () => {
        const sessionId = activeSessionId;
        if (!sessionId) return;
        const state = sessionStates.get(sessionId);
        if (!state) return;
        // Set reconnecting to prevent loops
        state.reconnecting = true;
        setTimeout(() => { state.reconnecting = false; }, 3000);
        // Clear stale timer
        if (state.staleTimer) {
          clearTimeout(state.staleTimer);
          state.staleTimer = null;
        }
        if (state.pollTimer) {
          clearInterval(state.pollTimer);
          state.pollTimer = null;
        }
        if (state.keepaliveTimer) {
          clearInterval(state.keepaliveTimer);
          state.keepaliveTimer = null;
        }
        if (state.socket) {
          state.socket.removeAllListeners();
          state.socket.disconnect();
          state.socket = null;
        }
        if (state.http?.terminalId) {
          try {
            await api(`/api/sessions/${sessionId}/terminal/http/stop`, {
              method: "POST",
              body: JSON.stringify({ terminalId: state.http.terminalId })
            });
          } catch {}
        }
        state.mode = "";
        state.http = null;
        // Force HTTP mode when clicking the HTTP button
        await openSessionTerminal(sessionId, state.displayName, { preserveBuffer: true, forceHttp: true });
        updateSwitchButtons();
      });

      // Switch to WS button
      el("switchWsBtn").addEventListener("click", async () => {
        const sessionId = activeSessionId;
        if (!sessionId) return;
        const state = sessionStates.get(sessionId);
        if (!state) return;
        // Set reconnecting to prevent loops
        state.reconnecting = true;
        setTimeout(() => { state.reconnecting = false; }, 3000);
        // Clear stale timer
        if (state.staleTimer) {
          clearTimeout(state.staleTimer);
          state.staleTimer = null;
        }
        if (state.pollTimer) {
          clearInterval(state.pollTimer);
          state.pollTimer = null;
        }
        if (state.keepaliveTimer) {
          clearInterval(state.keepaliveTimer);
          state.keepaliveTimer = null;
        }
        if (state.socket) {
          state.socket.removeAllListeners();
          state.socket.disconnect();
          state.socket = null;
        }
        if (state.http?.terminalId) {
          try {
            await api(`/api/sessions/${sessionId}/terminal/http/stop`, {
              method: "POST",
              body: JSON.stringify({ terminalId: state.http.terminalId })
            });
          } catch {}
        }
        state.mode = "";
        state.http = null;
        // Force WS mode
        await openSessionTerminal(sessionId, state.displayName, { preserveBuffer: true, forceWs: true });
        updateSwitchButtons();
      });

      // Update switch button text based on current mode
      const updateSwitchButtons = () => {
        const state = sessionStates.get(activeSessionId);
        const btn = el("switchModeBtn");
        const wsBtn = el("switchWsBtn");
        if (!btn || !wsBtn) return;
        if (state?.mode === "http") {
          btn.textContent = t("switchToHttp");
          btn.title = t("switchMode");
          wsBtn.style.display = "inline-block";
        } else if (state?.mode === "ws") {
          btn.textContent = t("switchToHttp");
          btn.title = t("switchMode");
          wsBtn.style.display = "inline-block";
        } else {
          btn.textContent = t("switchToHttp");
          wsBtn.style.display = "none";
        }
      };

      el("fullscreenBtn").addEventListener("click", () => {
        const terminal = el("terminal");
        if (document.fullscreenElement) {
          document.exitFullscreen();
        } else {
          terminal.requestFullscreen();
        }
      });

      el("pinWindowBtn").addEventListener("click", () => {
        if (document.mozRequestFullScreen) {
          document.mozRequestFullScreen();
        } else if (document.webkitRequestFullscreen) {
          document.webkitRequestFullscreen();
        }
      });

      // Initialize
      (async () => {
        initTheme();
        updateUIText();
        await loadMeta();
        await hydrateUser();
      })();
    </script>
  </body>
</html>
